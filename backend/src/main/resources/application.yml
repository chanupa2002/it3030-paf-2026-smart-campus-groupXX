spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: smart-campus-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
    username: ${DB_USER:postgres.bmbzkvvedompxxonjdoi}
    password: ${DB_PASSWORD:CHANGE_ME}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:2}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    connect-retries: 3
  sql:
    init:
      mode: never
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-placeholder}
            scope:
              - openid
              - profile
              - email
  web:
    resources:
      static-locations: classpath:/static/
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 150MB

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  key: ${SUPABASE_KEY:your-anon-key}
  bucket: ${SUPABASE_BUCKET:smart-campus-ticket-attachments}
  signed-url-expiry: ${SUPABASE_EXPIRY:31536000}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:smart-campus-demo-secret-key-2026-256bit}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  upload:
    dir: uploads/tickets
  mail:
    from: ${MAIL_FROM:no-reply@smartcampus.local}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}
